
<!DOCTYPE html>
<html>
<head>
<title>My Love 💙</title>

<style>
body{
    margin:0;
    text-align:center;
    font-family:Arial,sans-serif;

    /* Background Image */
    background-image:url("ashika.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

/* 3D Animated Name */
h1{
    margin-top:30px;
    font-size:70px;
    font-family:"Brush Script MT",cursive;
    color:#00BFFF;
    text-shadow:
        2px 2px 0 #004080,
        4px 4px 0 #003366,
        6px 6px 15px rgba(0,0,0,.6),
        0 0 20px #00BFFF,
        0 0 40px #1E90FF;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.08);
        text-shadow:
            2px 2px 0 #004080,
            4px 4px 0 #003366,
            8px 8px 20px rgba(0,0,0,.8),
            0 0 40px #00BFFF,
            0 0 80px #1E90FF;
    }
}

/* 3D Button */
button{
    padding:15px 35px;
    font-size:22px;
    font-weight:bold;
    color:white;
    background:linear-gradient(45deg,#00BFFF,#1E90FF);
    border:none;
    border-radius:50px;
    cursor:pointer;
    box-shadow:0 8px #003366;
    animation:pulse 1.5s infinite;
    transition:.3s;
}

button:hover{
    transform:translateY(-5px) scale(1.1);
    box-shadow:0 12px 25px rgba(0,191,255,.8);
}

button:active{
    transform:translateY(5px);
    box-shadow:0 4px #003366;
}

@keyframes pulse{
    0%{
        box-shadow:0 8px #003366,0 0 10px #00BFFF;
    }
    50%{
        box-shadow:0 8px #003366,0 0 30px #00BFFF;
    }
    100%{
        box-shadow:0 8px #003366,0 0 10px #00BFFF;
    }
}

/* Photos & Video */
.photo{
    width:300px;
    border-radius:20px;
    display:none;
    margin:15px;
    box-shadow:0 0 20px white;
    animation:fadeIn 1s;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>

<body>

<h1>💙 Ashika 💙</h1>

<button onclick="showPhotos()">
💙 Click Here 💙
</button>

<br><br>
<img class="photo" src="ash.jpg">
<img class="photo" src="ash1.jpg">
<img class="photo" src="ash2.jpg">
<img class="photo" src="ash5.jpg">
<video class="photo" controls width="300">
    <source src="ash3.mp4" type="video/mp4">
</video>

<video class="photo" controls width="300">
    <source src="ash4.mp4" type="video/mp4">
</video>

<video class="photo" controls width="300">
    <source src="ash6.mp4" type="video/mp4">
</video>
<video class="photo" controls width="300">
    <source src="ash7.mp4" type="video/mp4">
</video>

<script>
function showPhotos(){
    let items=document.getElementsByClassName("photo");

    for(let i=0;i<items.length;i++){
        items[i].style.display="inline-block";
    }
}
</script>

</body>
</html>
